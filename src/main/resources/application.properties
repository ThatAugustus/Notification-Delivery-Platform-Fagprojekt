spring.application.name=notification-platform
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/notification_platform
spring.datasource.username=dev
spring.datasource.password=dev
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=30

# ── Flyway (database migrations) ──
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG

# ── Docker Compose ──
spring.docker.compose.enabled=false

# ── RabbitMQ ──
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5673
spring.rabbitmq.username=dev
spring.rabbitmq.password=dev
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.template.observation-enabled=true

# ── Redis ──
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Mail (mailpit) ──
spring.mail.host=localhost
spring.mail.port=1025

#we need to remember to change this:
admin.api-key=dev-admin-key-change-me-in-prod

# ── Fairness Between Tenants ──
app.rate-limit.enabled=true
app.rate-limit.capacity=1000
app.rate-limit.refill-tokens=1000
app.rate-limit.refill-period-seconds=1
# Options: "per-tenant" or "shared"
app.notification-queues.mode=per-tenant

# ── Actuator (health checks) ──
management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# ── Distributed Tracing (OpenTelemetry → Tempo) ──
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
