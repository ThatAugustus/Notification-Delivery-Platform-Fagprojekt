# Docker profile overrides — used when the app runs inside Docker.
# Replaces "localhost" with Docker service names so containers can talk to each other.

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://postgres:5432/notification_platform
spring.datasource.hikari.maximum-pool-size=30

# ── RabbitMQ (internal Docker port, not the remapped host port) ──
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672

# ── Redis ──
spring.data.redis.host=redis

# ── Mail ──
spring.mail.host=mailpit
