services:
  postgres:
    image: postgres:17
    container_name: ndp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: notification_platform
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ndp-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev

  redis:
    image: redis:7
    container_name: ndp-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: ndp-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # Database UI — browse tables, run queries
  adminer:
    image: adminer:latest
    container_name: ndp-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # Host metrics — CPU, memory, disk, network
  node-exporter:
    image: prom/node-exporter:latest
    container_name: ndp-node-exporter
    ports:
      - "9100:9100"

  # Metrics — scrapes /actuator/prometheus every 5s
  prometheus:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.prometheus
    container_name: ndp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus

  # Dashboard — visualizes Prometheus data
  grafana:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.grafana
    container_name: ndp-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: dev
      GF_SECURITY_ADMIN_PASSWORD: dev
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  # App — only starts with: docker compose --profile full up
  app:
    build: .
    container_name: ndp-app
    profiles: ["full"]
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres
      - rabbitmq
      - redis
      - mailpit

volumes:
  pgdata:
  prometheus-data:
  grafana-data: