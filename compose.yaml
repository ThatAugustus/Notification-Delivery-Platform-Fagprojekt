services:
  postgres:
    image: postgres:17
    container_name: ndp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: notification_platform
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d notification_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ndp-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
      - "15693:15692"   # Prometheus metrics endpoint
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_prometheus return_per_object_metrics true"

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7
    container_name: ndp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: ndp-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # Database UI — browse tables, run queries
  adminer:
    image: adminer:latest
    container_name: ndp-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # Host metrics — CPU, memory, disk, network
  node-exporter:
    image: prom/node-exporter:latest
    container_name: ndp-node-exporter
    ports:
      - "9100:9100"

  # Distributed tracing — receives and stores traces from OpenTelemetry
  tempo:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.tempo
    container_name: ndp-tempo
    ports:
      - "4318:4318"    # OTLP HTTP receiver (app sends traces here)
      - "3200:3200"    # Tempo API (Grafana queries here)
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - tempo-data:/var/tempo

  # Metrics — scrapes /actuator/prometheus every 5s
  prometheus:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.prometheus
    container_name: ndp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus

  # Dashboard — visualizes Prometheus data
  grafana:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.grafana
    container_name: ndp-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: dev
      GF_SECURITY_ADMIN_PASSWORD: dev
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  # App — only starts with: docker compose --profile full up
  app:
      build: .
      container_name: ndp-app
      profiles: ["full"]
      ports:
        - "8080:8080"
      environment:
        SPRING_PROFILES_ACTIVE: docker
      depends_on:
        postgres:
          condition: service_healthy
        rabbitmq:
          condition: service_healthy
        redis:
          condition: service_healthy
        mailpit:
          condition: service_started

volumes:
  pgdata:
  prometheus-data:
  grafana-data:
  tempo-data: