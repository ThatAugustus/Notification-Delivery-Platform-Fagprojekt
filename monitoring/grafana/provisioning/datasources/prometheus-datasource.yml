# Auto-provision Prometheus as a Grafana data source on first boot.
# No manual setup needed — Grafana reads this file at startup.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: PBFA97CFB590B2093
    url: http://prometheus:9090
    isDefault: true
    editable: true
  
  - name: Tempo
    type: tempo
    access: proxy
    uid: tempo
    url: http://tempo:3200
    isDefault: false
    editable: true
